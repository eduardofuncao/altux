# ── Alt key bindings ───────────────

# Panes
bind -n 'M-"'  split-window -v                                          # prefix + "
bind -n 'M-%'  split-window -h                                          # prefix + %
bind -n 'M-!'  break-pane                                               # prefix + !
bind -n 'M-x'  kill-pane                                                # prefix + x
bind -n 'M-z'  resize-pane -Z                                           # prefix + z
bind -n 'M-o'  select-pane -t :.+                                       # prefix + o
bind -n 'M-;'  last-pane                                                # prefix + ;
bind -n 'M-q'  display-panes                                            # prefix + q
bind -n 'M-m'  select-pane -m                                           # prefix + m
bind -n 'M-M'  select-pane -M                                           # prefix + M
bind -n 'M-{'  swap-pane -U                                             # prefix + {
bind -n 'M-}'  swap-pane -D                                             # prefix + }

# Pane navigation
bind -n 'M-h'  select-pane -L                                           # prefix + Left
bind -n 'M-j'  select-pane -D                                           # prefix + Down
bind -n 'M-k'  select-pane -U                                           # prefix + Up
bind -n 'M-l'  select-pane -R                                           # prefix + Right

# Pane resize
bind -r -n 'M-Up'    resize-pane -U 5
bind -r -n 'M-Down'  resize-pane -D 5
bind -r -n 'M-Left'  resize-pane -L 5
bind -r -n 'M-Right' resize-pane -R 5

# Layout
bind -r -n 'M-Space' next-layout                                        # prefix + Space
bind -n 'M-E'       select-layout -E                                    # prefix + E

# Windows
bind -n 'M-c'  new-window                                               # prefix + c
bind -n 'M-n'  next-window                                              # prefix + n
bind -n 'M-p'  previous-window                                          # prefix + p
bind -n 'M-&'  confirm-before -p "kill-window #W? (y/n)"                # prefix + &
bind -n 'M-,'  command-prompt -I "#W" "rename-window '%%'"              # prefix + ,
bind -n 'M-w'  choose-tree -Zw                                          # prefix + w
bind -n 'M-f'  command-prompt { find-window -Z "%%" }                   # prefix + f
bind -n 'M-.'  command-prompt "move-window -t '%%'"                     # prefix + .

# Window selection by number
bind -n 'M-0'  select-window -t :=0                                     # prefix + 0
bind -n 'M-1'  select-window -t 1                                       # prefix + 1
bind -n 'M-2'  select-window -t 2
bind -n 'M-3'  select-window -t 3
bind -n 'M-4'  select-window -t 4
bind -n 'M-5'  select-window -t 5
bind -n 'M-6'  select-window -t 6
bind -n 'M-7'  select-window -t 7
bind -n 'M-8'  select-window -t 8
bind -n 'M-9'  select-window -t 9

# Sessions
bind -n 'M-s'  choose-tree -Zs                                          # prefix + s
bind -n 'M-$'  command-prompt -I "#S" "rename-session '%%'"             # prefix + $
bind -n 'M-d'  detach-client                                            # prefix + d
bind -n 'M-D'  choose-client                                            # prefix + D
bind -n 'M-r'  refresh-client                                           # prefix + r
bind -n 'M-L'  switch-client -l                                         # prefix + L

# Session switching
bind -n 'M-('  switch-client -p                                         # prefix + (
bind -n 'M-)'  switch-client -n                                         # prefix + )

# Copy / scrollback
bind -n 'M-Enter'   copy-mode                                           # prefix + [
bind -n 'M-]'       paste-buffer -p                                     # prefix + ]
bind -n 'M-='       choose-buffer -Z                                    # prefix + =
bind -n 'M-#'       list-buffers                                        # prefix + #
bind -n 'M--'       delete-buffer                                       # prefix + -
bind -n 'M-PageUp'  copy-mode -u                                        # prefix + PPage

# Misc
bind -n 'M-:'       command-prompt                                      # prefix + :
bind -n 'M-?'       list-keys -N                                        # prefix + ?
bind -n 'M-~'       show-messages                                       # prefix + ~
bind -n 'M-i'       display-message                                     # prefix + i
bind -n 'M-t'       clock-mode                                          # prefix + t
bind -n 'M-/'       command-prompt -k -p key { list-keys -1N "%%" }     # prefix + /
bind -n 'M-C'       customize-mode -Z                                   # prefix + C
bind -n 'M-Delete'  refresh-client -c                                   # prefix + DC
bind -n "M-'"       command-prompt -T window-target -p index { select-window -t ":%%" }  # prefix + '
